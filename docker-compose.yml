services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobs}
      POSTGRES_USER: ${POSTGRES_USER:-jobs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobs}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobs} -d ${POSTGRES_DB:-jobs}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://jobs:jobs@db:5432/jobs}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
    ports:
      - "8000:8000"
    volumes:
      - ./api:/workspace/api
    depends_on:
      db:
        condition: service_healthy

  pipelines:
    build:
      context: .
      dockerfile: pipelines/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://jobs:jobs@db:5432/jobs}
      GREENHOUSE_BOARD_TOKEN: ${GREENHOUSE_BOARD_TOKEN:-openai}
      PREFECT_LOGGING_LEVEL: ${PREFECT_LOGGING_LEVEL:-INFO}
    volumes:
      - ./api:/workspace/api
      - ./pipelines:/workspace/pipelines
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
